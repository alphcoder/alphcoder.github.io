<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--s:#0a0a0f;--c:#0d0d14;--ci:#101018;--b:rgba(255,255,255,.06);--t:#f0f0f5;--d:#5a5a72;--a:#f59e0b;--a2:#fbbf24;--e:cubic-bezier(.32,.72,0,1)}
body{background:var(--bg);color:var(--t);font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.grain{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
nav{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);z-index:100;background:rgba(13,13,20,.7);backdrop-filter:blur(24px);border:1px solid var(--b);border-radius:100px;padding:.5rem 1.5rem;display:flex;align-items:center;gap:1.5rem;font-size:.85rem;font-weight:600}
nav span{color:var(--a)}nav a{color:var(--d);text-decoration:none;font-size:.72rem;transition:color .4s}nav a:hover{color:var(--t)}
.wrap{max-width:1100px;margin:0 auto;padding:6rem 1.5rem 4rem}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.card{background:var(--c);border:1px solid var(--b);border-radius:1rem;padding:1.5rem}
.card .v{font-size:1.6rem;font-weight:800;margin-bottom:.2rem}
.card .ch{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:#10b981}
.card .l{font-size:.7rem;color:var(--d);margin-top:.3rem}
.bz{background:var(--c);border:1px solid var(--b);border-radius:1.25rem;padding:.375rem;margin-bottom:2rem}
.bz-in{background:var(--ci);border-radius:calc(1.25rem - .375rem);padding:1.5rem;box-shadow:inset 0 1px 1px rgba(255,255,255,.04)}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.chart-head h3{font-size:.9rem;font-weight:600}
.tabs{display:flex;gap:.3rem}
.tab{padding:.3rem .7rem;border-radius:100px;font-size:.65rem;color:var(--d);background:var(--s);border:1px solid var(--b);cursor:pointer;font-family:inherit;transition:all .4s}
.tab.ac{background:var(--a);border-color:var(--a);color:#000}
.tab:hover{border-color:var(--a)}
.chart{display:flex;align-items:end;gap:8px;height:180px;padding:1rem 0}
.bar-g{flex:1;display:flex;flex-direction:column;align-items:center;gap:.3rem}
.bar{width:100%;background:linear-gradient(to top,var(--a),var(--a2));border-radius:4px 4px 0 0;transition:all .5s var(--e);cursor:pointer;position:relative}
.bar:hover{opacity:.8}
.bar-l{font-size:.55rem;color:var(--d);font-family:'JetBrains Mono',monospace}
.tooltip{display:none;position:absolute;top:-2rem;left:50%;transform:translateX(-50%);background:var(--c);border:1px solid var(--b);border-radius:6px;padding:.2rem .5rem;font-size:.6rem;color:var(--t);white-space:nowrap;font-family:'JetBrains Mono',monospace}
.bar:hover .tooltip{display:block}
.search{width:100%;background:var(--s);border:1px solid var(--b);border-radius:100px;padding:.6rem 1.2rem;color:var(--t);font-family:inherit;font-size:.8rem;margin-bottom:1rem;outline:none;transition:border-color .4s}
.search:focus{border-color:var(--a)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:.7rem 1rem;color:var(--d);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--b);cursor:pointer;user-select:none;transition:color .3s;font-family:'JetBrains Mono',monospace}
th:hover{color:var(--t)}
td{padding:.7rem 1rem;border-bottom:1px solid var(--b);color:var(--d)}
tr:hover td{color:var(--t);background:rgba(255,255,255,.02)}
.cat-badge{font-size:.6rem;padding:.15rem .5rem;border-radius:100px;font-weight:500}
@media(max-width:768px){.cards{grid-template-columns:repeat(2,1fr)}.wrap{padding:5rem 1rem 3rem}}
</style>
</head>
<body>
<div class="grain"></div>
<nav><span>Sales</span> Dashboard <a href="https://alphcoder.github.io">← Портфолио</a></nav>
<div class="wrap">
<div class="cards">
<div class="card"><div class="v">2 847 000 &#8381;</div><div class="ch">+12.4%</div><div class="l">Выручка</div></div>
<div class="card"><div class="v">1 243</div><div class="ch">+8.2%</div><div class="l">Заказы</div></div>
<div class="card"><div class="v">2 290 &#8381;</div><div class="ch">+3.1%</div><div class="l">Средний чек</div></div>
<div class="card"><div class="v">4.2%</div><div class="ch">+0.6%</div><div class="l">Конверсия</div></div>
</div>
<div class="bz"><div class="bz-in">
<div class="chart-head"><h3>Выручка по месяцам</h3><div class="tabs"><button class="tab" onclick="setTab(this)">Неделя</button><button class="tab ac" onclick="setTab(this)">Месяц</button><button class="tab" onclick="setTab(this)">Год</button></div></div>
<div class="chart" id="chart"></div>
</div></div>
<div class="bz"><div class="bz-in">
<input class="search" placeholder="Поиск товаров..." oninput="filterTable(this.value)">
<table><thead><tr><th onclick="sortTable(0)">Товар</th><th onclick="sortTable(1)">Категория</th><th onclick="sortTable(2)">Цена</th><th onclick="sortTable(3)">Продажи</th><th onclick="sortTable(4)">Выручка</th></tr></thead><tbody id="tbody"></tbody></table>
</div></div>
</div>
<script>
const months=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const vals=[180,220,195,310,280,420,380,450,340,390,480,520];
const chart=document.getElementById('chart');
months.forEach((m,i)=>{
const h=Math.round(vals[i]/520*100);
chart.innerHTML+=`<div class="bar-g"><div class="bar" style="height:${h}%"><div class="tooltip">${vals[i]}K &#8381;</div></div><div class="bar-l">${m}</div></div>`;
});
function setTab(el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ac'));el.classList.add('ac')}
const products=[
['MacBook Pro 14"','Электроника','189 990',42,'7 979 580'],
['iPhone 15 Pro','Электроника','134 990',87,'11 744 130'],
['AirPods Pro 2','Электроника','24 990',156,'3 898 440'],
['Nike Air Max 90','Обувь','12 990',203,'2 636 970'],
['Куртка North Face','Одежда','18 500',94,'1 739 000'],
['Samsung Galaxy S24','Электроника','89 990',67,'6 029 330'],
['Кроссовки Adidas','Обувь','9 990',312,'3 116 880'],
['Рюкзак Samsonite','Аксессуары','7 490',178,'1 333 220'],
];
const colors={'Электроника':'rgba(139,92,246,.15);color:#a78bfa','Обувь':'rgba(245,158,11,.15);color:#fbbf24','Одежда':'rgba(16,185,129,.15);color:#6ee7b7','Аксессуары':'rgba(59,130,246,.15);color:#60a5fa'};
let data=[...products];let sortDir=1;
function render(d){
const tb=document.getElementById('tbody');
tb.innerHTML=d.map(r=>`<tr><td style="color:var(--t);font-weight:500">${r[0]}</td><td><span class="cat-badge" style="background:${colors[r[1]]}">${r[1]}</span></td><td>${r[2]} &#8381;</td><td>${r[3]}</td><td>${r[4]} &#8381;</td></tr>`).join('');
}
render(data);
function filterTable(q){
const f=products.filter(r=>r[0].toLowerCase().includes(q.toLowerCase())||r[1].toLowerCase().includes(q.toLowerCase()));
render(f);
}
function sortTable(col){
sortDir*=-1;
data.sort((a,b)=>{
const va=col>=2?parseInt(a[col].replace(/\s/g,'')):a[col];
const vb=col>=2?parseInt(b[col].replace(/\s/g,'')):b[col];
return(va>vb?1:-1)*sortDir;
});
render(data);
}
</script>
</body>
</html>
